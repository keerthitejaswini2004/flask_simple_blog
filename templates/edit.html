{% extends "base.html" %}

{% block content %}

<h2>Edit Post</h2>

<form method="POST">

Title
<br>
<input type="text" name="title" value="{{ post.title }}">

<br><br>

Content
<br>
<textarea name="content">{{ post.content }}</textarea>

<br><br>

<button type="submit">Update</button>

</form>

{% endblock %}
